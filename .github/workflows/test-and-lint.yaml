name: Test and lint

on: [push]

jobs:
  test-and-lint:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - uses: actions/setup-node@v6 # for oxlint
        with:
          node-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test -- --coverage --silent
      - run: bun lint
